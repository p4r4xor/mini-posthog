# Local ClickHouse for the ClickHouse EventStore adapter + benchmark.
# Brought up only when running against the ClickHouse engine; DuckDB needs nothing.
#   docker compose up -d clickhouse
services:
  clickhouse:
    image: clickhouse/clickhouse-server:26.5
    container_name: ata-clickhouse
    ports:
      - "8123:8123" # HTTP (used by @clickhouse/client)
      - "9000:9000" # native protocol
    environment:
      CLICKHOUSE_DB: ata
      CLICKHOUSE_USER: ata
      CLICKHOUSE_PASSWORD: ata
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Redis Streams — the ingestion buffer (shock absorber) for the async pipeline.
  redis:
    image: redis:7.4-alpine
    container_name: ata-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  clickhouse-data:
  redis-data:
